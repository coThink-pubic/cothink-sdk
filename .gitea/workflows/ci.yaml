name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/actions/checkout@v4
        with:
          repository: coThink/platform-testing
          ref: main
          path: platform-testing
          token: ${{ secrets.ORG_CLONE_PAT }}
      - name: Symlink sibling paths
        run: |
          set -e
          ROOT="$(pwd)"
          PARENT="$(dirname "$ROOT")"
          # platform-testing depends on link:../cothink-sdk. Nested checkout at
          # $ROOT/platform-testing resolves that to $ROOT/cothink-sdk, so alias
          # the workspace there. Container runners already use .../cothink-sdk as
          # ROOT; hostexecutor uses a random cache dir name and needs both aliases.
          ln -sfn "$ROOT" "$ROOT/cothink-sdk"
          ln -sfn "$ROOT" "$PARENT/cothink-sdk"
          ln -sfn "$ROOT/platform-testing" "$PARENT/platform-testing"
      - uses: https://github.com/pnpm/action-setup@v4
        with:
          version: 11.17.0
      - uses: https://github.com/actions/setup-node@v4
        with:
          node-version: '22'
      - name: Prefer action-setup pnpm over Corepack
        run: |
          set -e
          corepack disable || true
          hash -r || true
          command -v pnpm
          pnpm -v
      - run: pnpm install --frozen-lockfile && pnpm run build
      - run: pnpm --dir platform-testing install --frozen-lockfile && pnpm --dir platform-testing run build
      - run: pnpm run test
